services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: semantic-search-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: semantic_search
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    container_name: semantic-search-app
    ports:
      - '3420:3420'
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/semantic_search
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      PORT: '3420'
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
